<style>
  :root {
    --navy:   #0D1B3E;
    --navy2:  #122150;
    --navy3:  #1a2d68;
    --gold:   #B8963E;
    --gold2:  #D4AF6A;
    --gold3:  #F0D090;
    --bg:     #F4F1EB;
    --surface:#FFFFFF;
    --surface2:#F9F7F3;
    --border: #E2D9C8;
    --text:   #0D1B3E;
    --muted:  #6B6455;
    --success:#1A7A4A;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Decorative background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(184,150,62,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 80%, rgba(13,27,62,0.07) 0%, transparent 55%),
      linear-gradient(160deg, #F4F1EB 0%, #EDE8DF 50%, #F0EBE0 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle geometric pattern overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(184,150,62,0.03) 40px, rgba(184,150,62,0.03) 41px),
      repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(13,27,62,0.025) 40px, rgba(13,27,62,0.025) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 880px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 20px 44px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }
  .header-logo {
    height: 64px;
    margin-bottom: 28px;
    display: block;
    margin-left: auto; margin-right: auto;
    filter: drop-shadow(0 4px 16px rgba(184,150,62,0.18));
    animation: fadeDown .6s ease both;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 4.5vw, 42px);
    font-weight: 600;
    color: var(--navy);
    line-height: 1.15;
    letter-spacing: -0.5px;
    animation: fadeDown .7s .1s ease both;
  }
  header h1 span { color: var(--gold); }
  header p {
    color: var(--muted);
    margin-top: 10px;
    font-size: 13.5px;
    letter-spacing: .4px;
    animation: fadeDown .7s .2s ease both;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 30px;
    margin-bottom: 18px;
    box-shadow: 0 2px 20px rgba(13,27,62,0.06), 0 1px 4px rgba(13,27,62,0.04);
    position: relative;
    overflow: hidden;
    animation: fadeUp .5s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold3), var(--gold2), var(--gold));
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title::before {
    content:'';
    display:inline-block;
    width:18px; height:2px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
  }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media(max-width:580px){ .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 11.5px; color: var(--muted); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }

  select, input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 11px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }
  select:focus, input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,150,62,.12);
  }
  select option { background: #fff; color: var(--navy); }

  .input-prefix {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-prefix:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,150,62,.12);
  }
  .input-prefix span {
    padding: 0 13px;
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
    border-right: 1.5px solid var(--border);
    white-space: nowrap;
    height: 100%;
    display: flex;
    align-items: center;
    background: rgba(184,150,62,.06);
  }
  .input-prefix input { border: none; background: transparent; border-radius: 0; box-shadow: none; }

  input[type=range] {
    flex: 1; padding: 0;
    -webkit-appearance: none;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    border: none;
    box-shadow: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(184,150,62,.4);
  }
  .range-val {
    font-size: 13px; font-weight: 700;
    color: var(--gold);
    min-width: 48px; text-align: right;
  }

  /* ── BUTTON ── */
  .btn {
    display: block; width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy3) 100%);
    color: var(--gold2);
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 12px;
    cursor: pointer; letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all .25s;
    margin-top: 6px;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 20px rgba(13,27,62,.25);
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(212,175,106,.15) 0%, transparent 60%);
    opacity: 0; transition: opacity .25s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(13,27,62,.3); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }

  /* ── RESULT ── */
  .result { display: none; }
  .result.show { display: block; }

  .result-hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy3) 100%);
    border-radius: var(--radius);
    padding: 36px 28px;
    margin-bottom: 18px;
    text-align: center;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 40px rgba(13,27,62,.25);
  }
  .result-hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% -10%, rgba(184,150,62,.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 100% 100%, rgba(184,150,62,.1) 0%, transparent 50%);
  }
  .result-hero::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold2), var(--gold3), var(--gold2), transparent);
  }
  .result-hero .label {
    font-size: 11px; color: rgba(212,175,106,.7);
    letter-spacing: 2.5px; text-transform: uppercase;
    position: relative;
  }
  .result-hero .big {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 7vw, 58px);
    color: var(--gold2);
    margin: 10px 0 6px;
    letter-spacing: -1px;
    font-weight: 600;
    position: relative;
    text-shadow: 0 2px 20px rgba(184,150,62,.3);
  }
  .result-hero .sub { font-size: 12.5px; color: rgba(212,175,106,.6); position: relative; }

  /* ── STAT GRID ── */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
  @media(max-width:520px){ .stat-grid { grid-template-columns: 1fr 1fr; } }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 14px;
    text-align: center;
    box-shadow: 0 1px 8px rgba(13,27,62,.05);
    position: relative; overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute; top: 0; left: 20%; right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .stat .s-label { font-size: 10.5px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .stat .s-val { font-size: 17px; font-weight: 700; color: var(--navy); }
  .stat .s-val.green { color: var(--success); }

  /* ── TABLE ── */
  .tbl-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--navy);
    padding: 12px 14px;
    text-align: right; color: var(--gold2);
    font-size: 10.5px; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 600;
    white-space: nowrap;
  }
  thead th:first-child { text-align: center; }
  tbody tr { border-top: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 9px 14px; text-align: right; color: var(--text); }
  tbody td:first-child { text-align: center; color: var(--muted); font-size: 12px; }
  tbody tr:last-child td { color: var(--gold); font-weight: 700; }

  .note {
    font-size: 12px; color: var(--muted);
    background: rgba(184,150,62,.06);
    border: 1px solid rgba(184,150,62,.2);
    border-radius: 8px;
    padding: 13px 16px; margin-top: 16px; line-height: 1.7;
  }
  .divider { height: 1px; background: var(--border); margin: 22px 0; }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid rgba(13,27,62,.06);
    font-size: 13.5px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row span:first-child { color: var(--muted); font-size: 13px; }
  .info-row span:last-child { font-weight: 600; color: var(--navy); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* readonly inputs slightly dimmed */
  input[readonly] { opacity: .75; cursor: default; }
</style>
</head>

    <h1>Simulasi Kredit<br><span>Kendaraan Bermotor</span></h1>
    <p>Konversi Effective Rate → Flat Rate &nbsp;·&nbsp; Kalkulasi Komisi &amp; NPV</p>
  </header>

  <!-- Form -->
  <div class="card">
    <div class="card-title">Parameter Kendaraan</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Segmen / Niaga</label>
        <select id="segmen" onchange="updateOptions()">
          <option value="niaga_baru">Niaga (Pick Up/Truck) – Baru</option>
          <option value="niaga1_baru">Niaga 1 (Minibus/Micro Bus) – Baru</option>
          <option value="niaga_bekas_pickup">Niaga – Pick Up/Truck (Bekas)</option>
          <option value="niaga_bekas_l300">Niaga – L300 & FE (Bekas)</option>
          <option value="niaga1_bekas">Niaga 1 – Minibus/Microbus (Bekas)</option>
          <option value="retail">Retail – Minibus/Sedan/Jeep (Baru & Bekas)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tahun Kendaraan</label>
        <select id="tahunKen" onchange="updateOptions()"></select>
      </div>
      <div class="form-group">
        <label>Tenor (bulan)</label>
        <select id="tenor" onchange="updateRate()"></select>
      </div>
      <div class="form-group">
        <label>Tipe Customer</label>
        <select id="custType" onchange="updateRate()">
          <option value="non_salp">New Customer / RO Non SALP</option>
          <option value="salp">SALP</option>
        </select>
      </div>
      <div class="form-group">
        <label>Asuransi</label>
        <select id="asuransi" onchange="updateRate()">
          <option value="yes">Dengan Asuransi</option>
          <option value="no">Non Asuransi (+1.5% Eff)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Eff. Rate / Bunga Dealer (%)</label>
        <input type="number" id="effRate" step="0.25" min="0" max="50" value="25.00" readonly style="background:var(--surface2);opacity:.8;">
      </div>
      <div class="form-group">
        <label>Flat Rate Dealer (auto-konversi)</label>
        <input type="number" id="flatRateDealer" step="0.01" min="0" max="30" value="" readonly style="background:var(--surface2);opacity:.8;" placeholder="—">
      </div>
      <div class="form-group">
        <label>Subsidi / Komisi Rate Flat (%/thn) <span style="color:var(--gold);font-size:10px;">▲ tambah ke flat dealer</span></label>
        <input type="number" id="komisiRate" step="0.01" min="0" max="10" value="0" oninput="updateKomisi()" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Flat Rate Nasabah (setelah komisi)</label>
        <input type="number" id="flatRateNasabah" step="0.01" min="0" max="30" value="" readonly style="background:var(--surface2);color:var(--success);font-weight:600;opacity:1;" placeholder="—">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Data Pembiayaan</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Pokok Kredit</label>
        <div class="input-prefix">
          <span>Rp</span>
          <input type="text" id="pokok" value="120.000.000" placeholder="120.000.000" oninput="formatRibuan(this)" inputmode="numeric">
        </div>
      </div>
    </div>
    <div style="height:18px"></div>
    <button class="btn" onclick="hitung()">⚡ Hitung Simulasi</button>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-hero">
      <div class="label">Angsuran Per Bulan (Flat)</div>
      <div class="big" id="res-angsuran">—</div>
      <div class="sub" id="res-info">—</div>
    </div>

    <div class="stat-grid">
      <div class="stat">
        <div class="s-label">Pokok Kredit</div>
        <div class="s-val" id="res-otr">—</div>
      </div>
      <div class="stat">
        <div class="s-label">Flat Rate Nasabah</div>
        <div class="s-val green" id="res-flat">—</div>
      </div>
      <div class="stat">
        <div class="s-label">Eff. Rate</div>
        <div class="s-val" id="res-eff">—</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Rincian Pembiayaan</div>
      <div id="info-rows"></div>
      <div class="note" id="res-note"></div>
    </div>
  </div>
</div>

function updateOptions() {
  const seg = document.getElementById('segmen').value;
  const data = RATES[seg];
  const tenorSel = document.getElementById('tenor');
  const tahunSel = document.getElementById('tahunKen');

  // Tenor options
  tenorSel.innerHTML = '';
  data.tenors.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t + ' Bulan';
    tenorSel.appendChild(o);
  });

  // Tahun options
  tahunSel.innerHTML = '';
  if (data.tahunGroups) {
    data.tahunGroups.forEach((g,i) => {
      const o = document.createElement('option'); o.value = i; o.textContent = g.label;
      tahunSel.appendChild(o);
    });
    tahunSel.parentElement.style.display = '';
  } else {
    const o = document.createElement('option'); o.value = 0; o.textContent = 'Semua Tahun';
    tahunSel.appendChild(o);
    tahunSel.parentElement.style.display = 'none';
  }

  // Add onchange to tahunKen dynamically
  tahunSel.onchange = updateRate;

  updateRate();
}

function updateRate() {
  const seg = document.getElementById('segmen').value;
  const data = RATES[seg];
  const tenor = parseInt(document.getElementById('tenor').value);
  const cust = document.getElementById('custType').value;
  const tahunIdx = parseInt(document.getElementById('tahunKen').value) || 0;
  const asuransi = document.getElementById('asuransi').value;

  let rate;
  if (data.tahunGroups) {
    const grp = data.tahunGroups[tahunIdx];
    rate = grp[cust][tenor];
  } else {
    rate = data[cust][tenor];
  }

  if (rate === null || rate === undefined) {
    rate = '—';
  } else {
    if (asuransi === 'no') rate = parseFloat((rate + 1.5).toFixed(2));
    // check >20 year
    if (is20YearOld()) rate = parseFloat((rate + 2).toFixed(2));
  }

  document.getElementById('effRate').value = rate;

  // Compute flat rate dealer preview
  const _harga = getRaw('pokok') || 120000000;
  const _pokok = _harga;
  if (typeof rate === 'number' && _pokok > 0) {
    const _tenor = parseInt(document.getElementById('tenor').value);
    const { flatAnnual: _flatDealer } = effToFlat(rate, _pokok, _tenor);
    document.getElementById('flatRateDealer').value = _flatDealer.toFixed(3);
    updateKomisi();
  } else {
    document.getElementById('flatRateDealer').value = '';
    document.getElementById('flatRateNasabah').value = '';
  }
}

function is20YearOld() {
  const seg = document.getElementById('segmen').value;
  const data = RATES[seg];
  if (!data.tahunGroups) return false;
  const tahunIdx = parseInt(document.getElementById('tahunKen').value) || 0;
  const grp = data.tahunGroups[tahunIdx];
  const now = new Date().getFullYear();
  const label = grp.label;
  const yearMatch = label.match(/\d{4}/g);
  if (!yearMatch) return false;
  // Gunakan tahun terbaru dalam grup (maxYear) sebagai acuan
  const maxYear = Math.max(...yearMatch.map(Number));
  const tenor = parseInt(document.getElementById('tenor').value) || 12;
  // Cek apakah sampai akhir tenor, kendaraan sudah >20 tahun
  return (now - maxYear + Math.ceil(tenor / 12)) > 20;
}

function formatRibuan(el) {
  const pos = el.selectionStart;
  const raw = el.value.replace(/\D/g, '');
  const formatted = raw ? parseInt(raw).toLocaleString('id-ID') : '';
  el.value = formatted;
}

function getRaw(id) {
  const val = document.getElementById(id).value.replace(/\./g, '').replace(/,/g, '');
  return parseFloat(val) || 0;
}


function updateKomisi() {
  const flatDealer = parseFloat(document.getElementById('flatRateDealer').value);
  const komisi = parseFloat(document.getElementById('komisiRate').value) || 0;
  if (isNaN(flatDealer) || flatDealer === 0) {
    document.getElementById('flatRateNasabah').value = '';
    return;
  }
  const flatNasabah = flatDealer + komisi;
  document.getElementById('flatRateNasabah').value = flatNasabah.toFixed(3);
}

// Konversi Effective Rate (anuitas) -> Flat Rate
// Formula manual: Angsuran = Pokok × (flat% × tenorTahun/100 + 1) / tenorBulan
// Maka: flat% = (Angsuran × tenorBulan / Pokok - 1) / tenorTahun × 100
function effToFlat(effAnnual, pokok, tenor) {
  const r = effAnnual / 100 / 12;
  const angsuranAnuitas = r === 0
    ? pokok / tenor
    : pokok * r * Math.pow(1 + r, tenor) / (Math.pow(1 + r, tenor) - 1);
  const tenorTahun = tenor / 12;
  const flatAnnual = (angsuranAnuitas * tenor / pokok - 1) / tenorTahun * 100;
  return { flatAnnual, angsuran: angsuranAnuitas };
}

function fmt(n) {
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function hitung() {
  const harga = getRaw('pokok');
  const dpNom = 0;
  const tenor = parseInt(document.getElementById('tenor').value);
  const effRateStr = document.getElementById('effRate').value;

  if (!harga || isNaN(harga)) { alert('Masukkan pokok kredit.'); return; }
  if (effRateStr === '—' || effRateStr === '') { alert('Tenor tidak tersedia untuk kombinasi ini.'); return; }

  const effAnnual = parseFloat(effRateStr);
  const pokok = harga;

  if (pokok <= 0) { alert('DP terlalu besar.'); return; }

  const { flatAnnual: flatDealer, angsuran: angsuranAnuitas } = effToFlat(effAnnual, pokok, tenor);
  const komisi = parseFloat(document.getElementById('komisiRate').value) || 0;
  const flatNasabah = flatDealer + komisi;

  // Angsuran flat nasabah sesuai formula manual:
  // Angsuran = Pokok × (flatNasabah% × TenorTahun / 100 + 1) / TenorBulan
  const tenorTahun = tenor / 12;
  const pokokPerBulan = pokok / tenor;
  const angsuranNasabah = pokok * (flatNasabah / 100 * tenorTahun + 1) / tenor;
  const bungaFlatPerBulan = angsuranNasabah - pokokPerBulan;

  // Angsuran dealer dari flat dealer
  const angsuranDealer = pokok * (flatDealer / 100 * tenorTahun + 1) / tenor;

  const angsuran = angsuranNasabah;
  const totalBunga = bungaFlatPerBulan * tenor;
  const totalBayar = angsuran * tenor;

  // Nominal komisi = selisih angsuran nasabah (lebih besar) vs dealer
  const nominalKomisiPerBulan = angsuranNasabah - angsuranDealer;
  const totalNominalKomisi = nominalKomisiPerBulan * tenor;

  // Update UI
  document.getElementById('res-angsuran').textContent = fmt(angsuran);
  document.getElementById('res-info').textContent = `Tenor ${tenor} bulan · Eff. ${effAnnual}% · Flat Dealer ${flatDealer.toFixed(2)}% · Flat Nasabah ${flatNasabah.toFixed(2)}%`;
  document.getElementById('res-otr').textContent = fmt(pokok);
  document.getElementById('res-flat').textContent = flatNasabah.toFixed(2) + '%';
  document.getElementById('res-eff').textContent = effAnnual.toFixed(2) + '%';

  // Info rows
  const seg = document.getElementById('segmen').value;
  const data = RATES[seg];
  const tahunIdx = parseInt(document.getElementById('tahunKen').value) || 0;
  const tahunLabel = data.tahunGroups ? data.tahunGroups[tahunIdx].label : 'Baru';

  // NPV komisi sesuai formula Excel:
  // = Pokok × diff_rate% × tenorTahun / (1 + custFlat% × tenorTahun)
  const npvKomisi = pokok * (komisi / 100) * tenorTahun / (1 + flatNasabah / 100 * tenorTahun);
  const npvKomisiPctPokok = (npvKomisi / pokok) * 100;

  document.getElementById('info-rows').innerHTML = `
    <div class="info-row"><span>Segmen</span><span>${data.label}</span></div>
    <div class="info-row"><span>Kondisi / Tahun</span><span>${tahunLabel}</span></div>
    <div class="info-row"><span>Tenor</span><span>${tenor} Bulan</span></div>
    <div class="info-row"><span>Angsuran Nasabah</span><span style="color:var(--success);font-weight:600">${fmt(angsuranNasabah)} / bln</span></div>
    <div class="info-row" style="background:rgba(184,150,62,.06);border-radius:6px;padding:10px 0;margin-top:4px">
      <span style="color:var(--gold);font-weight:600">Total Komisi (NPV)</span>
      <span style="color:var(--gold);font-weight:600">${fmt(npvKomisi)}<br><small style="color:var(--muted);font-weight:400;font-size:11px">${npvKomisiPctPokok.toFixed(3)}% dari pokok kredit</small></span>
    </div>
  `;

  // Note
  const asuransiNote = document.getElementById('asuransi').value === 'no' ? ' (+1.5% Eff Non Asuransi)' : '';
  const tahunNote = is20YearOld() ? ' (+2% Eff karena kendaraan >20 tahun)' : '';
  const komisiNote = komisi > 0 ? ` Subsidi flat +${komisi}%/thn menghasilkan nominal komisi ${fmt(totalNominalKomisi)} selama ${tenor} bulan.` : '';
  document.getElementById('res-note').innerHTML =
    `<strong>Catatan:</strong> Flat Rate Dealer = ${flatDealer.toFixed(3)}% (dari Eff. ${effAnnual}%${asuransiNote}${tahunNote}). ` +
    `Flat Rate Nasabah = ${flatNasabah.toFixed(3)}% setelah ditambah subsidi ${komisi}%.${komisiNote}`;

  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Init
updateOptions();
</script>

<script>
if ('serviceWorker' in navigator) {

      .then(reg => console.log('[PWA] SW terdaftar:', reg.scope))

let deferredPrompt = null;
const banner     = document.getElementById('pwa-banner');
const btnInstall = document.getElementById('pwa-btn-install');
const btnClose   = document.getElementById('pwa-btn-close');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => banner.classList.add('visible'), 2000);
});

btnInstall.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') banner.classList.remove('visible');
  deferredPrompt = null;
});

btnClose.addEventListener('click', () => banner.classList.remove('visible'));

window.addEventListener('appinstalled', () => {
  banner.classList.remove('visible');
  deferredPrompt = null;
});
</script>
